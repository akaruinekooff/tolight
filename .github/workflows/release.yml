name: build-and-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: tolight

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: tolight

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: tolight.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            bin: tolight

          - os: macos-latest
            target: aarch64-apple-darwin
            bin: tolight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/

      - name: Archive (linux/mac)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ../tolight-${{ matrix.target }}.tar.gz *

      - name: Archive (windows)
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive -Path dist/* -DestinationPath tolight-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tolight-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.zip
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
